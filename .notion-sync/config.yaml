# .notion-sync/config.yaml
# vault .md → Notion 페이지 미러 동기 설정 (B-1 자동 동기)
# 정본 규칙: 30-References/notion-mcp.md
#
# vault가 단일 진실 공급원. 이 파일의 매핑에 있는 .md만 동기 대상.

# Notion Internal Integration Token 경로 (vault 밖, mode 600)
# 우선순위: 환경변수 NOTION_TOKEN > 이 경로의 파일 내용
token_path: "~/.config/notion-sync/token"

github:
  # 실습 코드 링크 카드용 blob base URL (repo는 public)
  owner: "hyoungwonkang"
  repo: "python_prac_with_obsidian"
  branch: "main"

sync:
  # 변경 검출 기준: post-commit 직후 HEAD~1..HEAD 비교
  diff_base: "HEAD~1"
  diff_head: "HEAD"
  # 페이지 본문 교체 시 한 번에 append 가능한 블록 수 (Notion API 한도)
  batch_size: 100
  # 페이지 상단에 정본 출처 callout 삽입
  source_callout: true

# vault 경로(레포 루트 기준) → Notion page_id
# page_id 출처: 30-References/notion-mcp.md "Notion 페이지 매핑"
